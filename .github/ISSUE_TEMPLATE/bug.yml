name: Bug report
description: Something behaves incorrectly
title: "[bug]: "
labels: ["type:bug"]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What you expected
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. FORAY_FAKE=1 foray run "..."
        2. ...
  - type: input
    id: version
    attributes:
      label: Version / commit
