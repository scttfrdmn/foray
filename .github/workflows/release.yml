name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Validate + build + publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Derive version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: VERSION file matches tag
        run: |
          want="${{ steps.ver.outputs.version }}"
          got="$(cat VERSION)"
          if [ "$want" != "$got" ]; then
            echo "VERSION ($got) does not match tag ($want)"; exit 1
          fi

      - name: CHANGELOG has a section for this version
        run: |
          v="${{ steps.ver.outputs.version }}"
          if ! grep -qE "^## \[$v\]" CHANGELOG.md; then
            echo "CHANGELOG.md is missing a '## [$v]' section (Keep a Changelog)"; exit 1
          fi

      - name: Build binaries
        run: |
          mkdir -p dist
          for osarch in linux/amd64 linux/arm64 darwin/arm64; do
            os="${osarch%/*}"; arch="${osarch#*/}"
            GOOS="$os" GOARCH="$arch" go build \
              -ldflags "-X main.version=${{ steps.ver.outputs.version }} -X main.commit=${GITHUB_SHA::7}" \
              -o "dist/foray-${os}-${arch}" ./cmd/foray || \
              echo "skip foray ${os}/${arch} (not yet buildable)"
          done
          ls -la dist || true

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --notes "See CHANGELOG.md for details." \
            dist/* || gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" --notes "See CHANGELOG.md for details."
