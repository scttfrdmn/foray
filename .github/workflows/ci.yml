name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  format:
    name: gofmt + license headers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - name: gofmt
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then echo "gofmt needed:"; echo "$out"; exit 1; fi
      - name: license headers
        run: bash scripts/license-check.sh

  vet-build:
    name: vet + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - name: vet
        run: go vet ./...
      - name: build
        run: go build ./...

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    continue-on-error: true # informational: version is unpinned, may add rules
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2

  test:
    name: go test (full tree)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - run: go test ./...

  demo-fake:
    name: demo-fake (CI gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - run: make demo-fake

  worker-test:
    name: worker pytest (no GPU, no AWS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # Base deps only — the GPU stack (torch/nnsight/vllm) is never installed in
      # CI; the worker imports it lazily inside the real paths, which FORAY_FAKE=1
      # never enters.
      - run: pip install -r worker/requirements.txt
      - run: ruff check worker
      - run: make worker-test

  iac:
    name: terraform fmt + validate + deploy-check (no AWS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"
      # No credentials, no apply: format, init without a backend, validate, and
      # run the PLACEHOLDER/LICENSED_WORKLOAD_STUB guard. Real deploy is
      # hand-validated, never in CI (the worker-smoke precedent).
      - run: terraform -chdir=deploy/terraform fmt -check -recursive
      - run: terraform -chdir=deploy/terraform init -backend=false
      - run: terraform -chdir=deploy/terraform validate
      - run: make deploy-check
