# golangci-lint config (schema v2) for foray. stdlib-first, terse, no surprises.
version: "2"

run:
  timeout: 5m

linters:
  enable:
    - govet
    - staticcheck
    - errcheck
    - ineffassign
    - unused
    - misspell
    - revive
  settings:
    misspell:
      locale: US
    revive:
      rules:
        # ctx is kept on every seam method for interface symmetry and prod use,
        # even where the fake path doesn't read it yet.
        - name: unused-parameter
          disabled: true
        # Const blocks carry inline comments; a block doc-comment is redundant.
        - name: exported
          arguments: [checkPrivateReceivers]
          disabled: true
  exclusions:
    rules:
      # Fakes and test fixtures intentionally ignore some returns.
      - path: (_test\.go|/fake\.go)
        linters:
          - errcheck

formatters:
  enable:
    - gofmt
  settings:
    gofmt:
      simplify: true
